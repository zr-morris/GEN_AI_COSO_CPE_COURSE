<table class="block-table" style="border-collapse:collapse; margin:1rem 0;">
  {% if value.headers %}
    <thead><tr>
      {% for h in value.headers %}<th style="border:1px solid #ccc; padding:0.5rem; background:#f5f5f5;">{{ h }}</th>{% endfor %}
    </tr></thead>
  {% endif %}
  <tbody>
    {% for row in value.rows %}
      <tr>{% for cell in row %}<td style="border:1px solid #ccc; padding:0.5rem;">{{ cell }}</td>{% endfor %}</tr>
    {% endfor %}
  </tbody>
</table>
