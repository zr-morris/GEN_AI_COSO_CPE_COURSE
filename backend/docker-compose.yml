services:
  postgres:
    image: postgres:17-alpine
    container_name: coso-cpe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coso_cpe}
      POSTGRES_USER: ${POSTGRES_USER:-coso_cpe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coso_cpe_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coso_cpe} -d ${POSTGRES_DB:-coso_cpe}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: coso_cpe_postgres_data
